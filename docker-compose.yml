services:
  sqlserver:
    # Azure SQL Edge runs the SQL Server engine natively on both arm64 (Apple Silicon)
    # and amd64. On an amd64-only host instead use:
    #   image: mcr.microsoft.com/mssql/server:2022-latest
    image: mcr.microsoft.com/azure-sql-edge:latest
    container_name: challenge-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Id0ntKn0WC#2WellButItsN0tFirstRode0"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/1433' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  api:
    build:
      context: .
      dockerfile: src/Challenge.Api/Dockerfile
    container_name: challenge-api
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_URLS: "http://+:8080"
      ConnectionStrings__Default: "Server=sqlserver,1433;Database=ChallengeDb;User Id=sa;Password=Id0ntKn0WC#2WellButItsN0tFirstRode0;TrustServerCertificate=True;"
    depends_on:
      sqlserver:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  sqlserver-data:
